<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kiro API 测试</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; background: #1a1a2e; color: #eee; }
    h1 { color: #00d9ff; }
    h3 { color: #aaa; margin: 20px 0 10px; }
    .nav { margin-bottom: 20px; }
    .nav a { color: #00d9ff; text-decoration: none; }
    .nav a:hover { text-decoration: underline; }
    .card { background: #16213e; border-radius: 8px; padding: 20px; margin: 20px 0; }
    textarea { width: 100%; height: 200px; padding: 12px; border: 1px solid #333; border-radius: 4px; background: #0f0f23; color: #fff; font-family: monospace; font-size: 13px; resize: vertical; }
    button { background: #00d9ff; color: #000; border: none; padding: 12px 24px; border-radius: 4px; cursor: pointer; margin: 10px 5px 10px 0; font-weight: bold; }
    button:hover { background: #00b8d4; }
    button.secondary { background: #444; color: #fff; }
    button.secondary:hover { background: #555; }
    pre { background: #0f0f23; padding: 15px; border-radius: 4px; overflow-x: auto; white-space: pre-wrap; word-break: break-all; max-height: 300px; font-size: 12px; }
    .error { color: #ff6b6b; }
    .success { color: #51cf66; }
    .hint { color: #888; font-size: 12px; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="nav">
    <a href="/">← 返回首页</a>
  </div>
  
  <h1>Kiro API 测试</h1>
  
  <div class="card">
    <h3>账号 JSON（支持单个或数组）</h3>
    <textarea id="jsonInput" placeholder='{
  "accessToken": "...",
  "refreshToken": "...",
  "provider": "Google"
}

IdC 类型（BuilderId/Enterprise）需要额外字段：
{
  "accessToken": "...",
  "refreshToken": "...",
  "provider": "BuilderId",
  "clientId": "...",
  "clientSecret": "...",
  "region": "us-east-1"
}'></textarea>
    <p class="hint">
      Social 类型 (Google/Github)：accessToken, refreshToken, provider<br>
      IdC 类型 (BuilderId/Enterprise)：accessToken, refreshToken, provider, clientId, clientSecret, region(可选)
    </p>
  </div>

  <div class="card">
    <button onclick="testUsage()">获取配额 (Usage)</button>
    <button onclick="testRefresh()">刷新 Token (Refresh)</button>
    <button class="secondary" onclick="formatJson()">格式化 JSON</button>
    <button class="secondary" onclick="clearAll()">清空</button>
  </div>

  <div class="card">
    <pre id="result">结果将显示在这里...</pre>
  </div>

  <script>
    const $ = id => document.getElementById(id)

    function parseInput() {
      const text = $('jsonInput').value.trim()
      if (!text) throw new Error('请输入 JSON 数据')
      const data = JSON.parse(text)
      return Array.isArray(data) ? data : [data]
    }

    function formatJson() {
      try {
        const data = JSON.parse($('jsonInput').value)
        $('jsonInput').value = JSON.stringify(data, null, 2)
      } catch (e) {
        $('result').className = 'error'
        $('result').textContent = 'JSON 格式错误: ' + e.message
      }
    }

    function clearAll() {
      $('jsonInput').value = ''
      $('result').textContent = '结果将显示在这里...'
      $('result').className = ''
    }

    async function testUsage() {
      $('result').textContent = '请求中...'
      try {
        const accounts = parseInput()
        const results = []
        
        for (const acc of accounts) {
          const provider = acc.provider || acc.idp || 'Google'
          const accessToken = acc.accessToken || acc.access_token
          
          if (!accessToken) {
            results.push({ error: '缺少 accessToken', account: acc })
            continue
          }

          // 判断认证类型
          const isIdC = ['BuilderId', 'Enterprise', 'idc'].includes(provider)
          const body = { accessToken, authMethod: isIdC ? 'idc' : 'social' }
          if (!isIdC) body.idp = provider

          const res = await fetch('/api/usage', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          })
          const data = await res.json()
          results.push({ status: res.status, provider, authMethod: body.authMethod, data })
        }

        $('result').className = 'success'
        $('result').textContent = JSON.stringify(results, null, 2)
      } catch (e) {
        $('result').className = 'error'
        $('result').textContent = '错误: ' + e.message
      }
    }

    async function testRefresh() {
      $('result').textContent = '请求中...'
      try {
        const accounts = parseInput()
        const results = []
        
        for (const acc of accounts) {
          const provider = acc.provider || 'Google'
          const refreshToken = acc.refreshToken || acc.refresh_token
          const machineId = acc.machineId || acc.machine_id
          
          if (!refreshToken) {
            results.push({ error: '缺少 refreshToken', account: acc })
            continue
          }

          // 判断认证类型
          const isIdC = ['BuilderId', 'Enterprise', 'idc'].includes(provider)
          
          if (isIdC) {
            // IdC 需要 clientId 和 clientSecret
            const clientId = acc.clientId || acc.client_id
            const clientSecret = acc.clientSecret || acc.client_secret
            const region = acc.region || 'us-east-1'
            
            if (!clientId || !clientSecret) {
              results.push({ error: 'IdC 类型需要 clientId 和 clientSecret', account: acc })
              continue
            }

            const res = await fetch('/api/refresh', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ refreshToken, authMethod: 'idc', clientId, clientSecret, region })
            })
            const data = await res.json()
            results.push({ status: res.status, provider, authMethod: 'idc', data })
          } else {
            // Social 类型
            const body = { refreshToken, authMethod: 'social' }
            if (machineId) body.machineId = machineId

            const res = await fetch('/api/refresh', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(body)
            })
            const data = await res.json()
            results.push({ status: res.status, provider, authMethod: 'social', data })
          }
        }

        $('result').className = 'success'
        $('result').textContent = JSON.stringify(results, null, 2)
      } catch (e) {
        $('result').className = 'error'
        $('result').textContent = '错误: ' + e.message
      }
    }
  </script>
</body>
</html>
