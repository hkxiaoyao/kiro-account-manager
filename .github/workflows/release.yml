name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    if: ${{ !endsWith(github.repository, '_dev') }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: ''
          - platform: macos-latest
            target: 'x86_64-apple-darwin'
          - platform: macos-latest
            target: 'aarch64-apple-darwin'
          - platform: ubuntu-22.04
            target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Clean and install dependencies
        shell: bash
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'Kiro Account Manager v__VERSION__'
          releaseBody: '请查看 CHANGELOG 了解更新内容。'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.target && format('--target {0}', matrix.target) || '' }}

  # 修正 latest.json，移除不支持在线更新的 deb 平台
  fix-updater-json:
    if: ${{ !endsWith(github.repository, '_dev') }}
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Wait for release assets
        run: sleep 30

      - name: Fix latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 下载 latest.json
          gh release download ${{ github.ref_name }} -p "latest.json" -R ${{ github.repository }} -O latest.json || exit 0
          
          # 移除 linux-x86_64-deb 平台（deb 不支持在线更新）
          if [ -f latest.json ]; then
            jq 'del(.platforms["linux-x86_64-deb"])' latest.json > latest_fixed.json
            mv latest_fixed.json latest.json
            
            # 上传修正后的文件
            gh release upload ${{ github.ref_name }} latest.json --clobber -R ${{ github.repository }}
            echo "✅ 已移除 linux-x86_64-deb 平台"
          fi
