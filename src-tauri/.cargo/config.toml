[build]
# 并行编译任务数（根据 CPU 核心数调整）
jobs = 8
# 增量编译（默认开启，但显式声明）
incremental = true
# 使用 pipelined 编译（Rust 1.90+ 支持）
pipelining = true

# Windows 使用默认链接器（lld 在 Windows 上可能有兼容性问题）
# Linux 使用 lld 链接器
# macOS 使用默认链接器（不支持 lld）
[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

# 网络配置
[net]
# 使用 git CLI 而非内置 git（更快）
git-fetch-with-cli = true

# 注册表配置
[registries.crates-io]
protocol = "sparse"  # 使用稀疏索引（更快）
